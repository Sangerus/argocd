<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Docker Journey</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #008bb9; /* Màu xanh đặc trưng của Docker */
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            background: rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            max-width: 600px;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        p {
            font-size: 1.2rem;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        .quote {
            font-style: italic;
            color: #ffce00; /* Màu vàng nổi bật cho lời khuyên */
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Hello Nhom 4!</h1>
        <p>Hope all of you will be <strong>successful</strong> in deploying a web page to Docker.</p>
        <p class="quote">REMEMBER: Every journey begins with a step.</p>
    </div>
</body>
</html>
